<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Shem's Rafting Adventure</title>
    <meta name="description"
      content="Get in touch with Shem's Rafting Adventure. Find our details, and send us a message for general inquiries, reservations, or suggestions.">
    <meta name="author" content="Jan Mormon D. Esling">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="grid-header">
        <img src="images/z-raftingcompas.jpg" alt="Rafting site logo">
        <nav class="flex-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact-container">
            <div class="company-info">
                <h2>We Are Here to Serve You</h2>
                <div class="company-details">
                    <h3>Shem's Rafting Adventure</h3>
                    <address>
                        Grand Canyon Village<br>
                        Arizona, 86023<br>
                        +1 123 443 3215<br>
                        <a href="mailto:info@shemwhitewater.com">info@shemwhitewater.com</a>
                    </address>
                    <div class="map-container">
                        <iframe
                          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1139.7537901127673!2d-112.09073557583582!3d36.100543659753605!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8733174f95ffe325%3A0xb8ccc2749a229ea1!2sGrand%20Canyon%20Village%2C%20AZ%2086023%2C%20USA!5e0!3m2!1sen!2sph!4v1775244919818!5m2!1sen!2sph"
                          width="600" height="450" style="border:0;" allowfullscreen=""
                          loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <h2>Send Us a Message</h2>
                <form action="#" method="post">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com"
                      required>

                    <fieldset class="purpose-group">
                        <legend>Message Purpose:</legend>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="General Inquiry" required>
                            General
                            Inquiry
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="Reservation Question">
                            Reservation
                            Question
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="Website Suggestion"> Website
                            Suggestion
                        </label>
                    </fieldset>
                    <label for="message">Message Type Here:</label>
                    <textarea id="message" name="message" rows="5"
                      placeholder="Please share your questions, feedback, or suggestions..."
                      required></textarea>
                    <label class="checkbox-label">
                        <input type="checkbox" name="newsletter" value="subscribe"> Please Subscribe
                        me
                        to the monthly newsletter
                    </label>
                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </div>
        </div>

        <section class="employee-profiles">
            <h2>Meet Our Expert Team</h2>
            <div class="profiles-grid">
                <figure>
                    <img src="images/employee1.jpg" alt="Lead Rafting Guide Vaughn Sanders">
                    <figcaption><strong>Vaughn Sanders</strong><br>Lead Rafting Guide & Safety
                        Coordinator
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Trip Director - Kaya Esling">
                    <figcaption><strong>Kaya Esling</strong><br>Second Generation Owner & Trip
                        Director
                    </figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg"
                      alt="River Logistics Manager - Amarjeet Rajeesh">
                    <figcaption><strong>Amarjeet Rajeesh</strong><br>River Logistics & Expedition
                        Manager
                    </figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Shem's Rafting Adventure | Jan Mormon D. Esling</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://tiktok.com">
                <img src="images/tictok-bw.svg" alt="TikTok Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
